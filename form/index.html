function Field({label,required,hint,children}){
  return(
    <div style={{marginBottom:16}}>
      <label style={{display:"block",fontSize:11,fontWeight:700,color:"#374151",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>
        {required?<span style={{color:"#dc2626",marginRight:3}}>●</span>:<span style={{color:TEAL,marginRight:3}}>○</span>}
        {label}
      </label>
      {hint&&<div style={{fontSize:10,color:"#6b7280",marginBottom:5,lineHeight:1.5}}>{hint}</div>}
      {children}
    </div>
  );
}

const iStyle={width:"100%",padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:13,outline:"none",background:"white",fontFamily:"inherit"};
function Inp({value,onChange,placeholder,type="text"}){
  return <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={iStyle} onFocus={e=>e.target.style.borderColor=BLUE} onBlur={e=>e.target.style.borderColor="#d1d5db"}/>;
}
function Txt({value,onChange,placeholder,rows=3}){
  return <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
    style={{...iStyle,resize:"vertical",lineHeight:1.6}}
    onFocus={e=>e.target.style.borderColor=BLUE} onBlur={e=>e.target.style.borderColor="#d1d5db"}/>;
}
function Sel({value,onChange,options}){
  return <select value={value} onChange={e=>onChange(e.target.value)} style={{...iStyle,cursor:"pointer"}}>
    <option value="">선택해주세요</option>
    {options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
  </select>;
}
function Radio({value,onChange,options}){
  return <div style={{display:"flex",gap:16,flexWrap:"wrap",marginTop:2}}>
    {options.map(o=>(
      <label key={o.v} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13}}>
        <input type="radio" value={o.v} checked={value===o.v} onChange={()=>onChange(o.v)} style={{accentColor:NAVY,width:15,height:15}}/>
        {o.l}
      </label>
    ))}
  </div>;
}
function G2({children}){return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>{children}</div>;}
function G3({children}){return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>{children}</div>;}

// ─── API KEY SETUP SCREEN ───────────────────────────────
function SetupScreen({onDone}){
  const [key,setKey]=useState("");
  const [show,setShow]=useState(false);
  const [err,setErr]=useState("");

  const save=()=>{
    if(!key.trim().startsWith("sk-ant-")){
      setErr("올바른 Anthropic API 키를 입력해주세요. (sk-ant-... 로 시작)");
      return;
    }
    sessionStorage.setItem("yes_apikey",key.trim());
    onDone(key.trim());
  };

  return(
    <div style={{minHeight:"100vh",background:"#f3f4f6",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"white",borderRadius:16,padding:"36px 40px",maxWidth:500,width:"100%",boxShadow:"0 4px 24px rgba(0,0,0,0.10)"}}>
        <div style={{fontSize:11,fontWeight:700,color:NAVY,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>예스유학 · YES Study Abroad</div>
        <div style={{fontSize:22,fontWeight:700,color:"#111827",marginBottom:4}}>학생 제안서 시스템</div>
        <div style={{fontSize:13,color:"#6b7280",marginBottom:28,lineHeight:1.6}}>AI 분석 기능을 사용하려면 Anthropic API 키가 필요합니다.<br/>최초 1회 입력 후 브라우저 세션 동안 유지됩니다.</div>

        <div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:12,color:"#0c4a6e",lineHeight:1.7}}>
          <b>API 키 발급 방법:</b><br/>
          1. <a href="https://console.anthropic.com" target="_blank" style={{color:BLUE}}>console.anthropic.com</a> 접속<br/>
          2. 로그인 → API Keys → Create Key<br/>
          3. 생성된 키 복사 (sk-ant-... 형식)
        </div>

        <label style={{display:"block",fontSize:11,fontWeight:700,color:"#374151",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>
          Anthropic API Key
        </label>
        <div style={{position:"relative",marginBottom:8}}>
          <input
            type={show?"text":"password"}
            value={key}
            onChange={e=>setKey(e.target.value)}
            placeholder="sk-ant-api03-..."
            style={{...iStyle,paddingRight:70,fontFamily:"monospace"}}
            onKeyDown={e=>e.key==="Enter"&&save()}
          />
          <button onClick={()=>setShow(s=>!s)}
            style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:11,color:"#6b7280",padding:"4px 8px"}}>
            {show?"숨기기":"보이기"}
          </button>
        </div>
        {err&&<div style={{color:"#dc2626",fontSize:11,marginBottom:8}}>{err}</div>}

        <button onClick={save}
          style={{width:"100%",padding:"13px",background:NAVY,color:"white",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:8}}>
          시작하기 →
        </button>

        <div style={{marginTop:16,padding:"10px 14px",background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:8,fontSize:11,color:"#6b7280",lineHeight:1.6}}>
          💡 API 키 없이도 폼 작성 후 데이터 복사는 가능합니다.<br/>
          <button onClick={()=>onDone("")}
            style={{background:"none",border:"none",color:BLUE,cursor:"pointer",fontSize:11,fontWeight:600,padding:0,marginTop:4,display:"block"}}>
            API 키 없이 계속하기 →
          </button>
        </div>
      </div>
    </div>
  );
}

  const txt=()=>`예스유학 학생 정보

  const localAnalysis=(source=d)=>{
    const d=source;
    const filled=(keys)=>keys.reduce((n,k)=>n+(String(d[k]||"").trim()?1:0),0);
    const has=(...keys)=>keys.some(k=>String(d[k]||"").trim());
    const num=(v)=>parseInt(String(v||"").replace(/[^0-9]/g,""),10)||0;
    const cap=(value,max,min=0)=>Math.max(min,Math.min(max,value));
    const ssat=num(d.ssatOverall), math=num(d.ssatMath), toefl=num(d.toeflScore);

    const academicReco=has("recLetterCandidates")?4:has("currentGrades","prevGrades")?3:2;
    const academics=cap(gpaScore+academicReco,20);
    const testing=cap((ssat?ssat/10:0)+(toefl?Math.max(0,(toefl-80)/3):0),10);
    const englishFluency=toefl>=110?95:toefl>=105?90:toefl>=100?85:toefl>=90?75:toefl?60:70;
    const interview=cap((englishFluency/100)*6 + (has("studentPersonality","leadershipRoles")?2:0) + (has("schoolPriority","dreamSchools")?2:0),10);
    const studentLifeReco=cap((has("recLetterCandidates")?3:1)+(has("studentPersonality")?1:0)+(has("leadershipRoles")?1:0),5);
    const service=cap(has("serviceActivities")?(String(d.serviceHours).includes("100")?5:String(d.serviceHours).includes("50")?4:String(d.serviceHours).includes("20")?3:2):1,5);
    const culture=cap(interview+studentLifeReco+service,20);
    const ecStrength=cap(filled(["mainSport","instrument","dramaExp","visualArts","clubs","academicPrograms"])*0.75 + (has("mainSportAwards","academicAwards","musicAwards","leadershipAwards")?2:0),5);
    const leadershipScore=cap((has("leadershipRoles")?3:1)+(has("clubs","serviceActivities")?1:0)+(has("leadershipAwards")?1:0),5);
    const hookScore=cap((has("mainHook")?3:1)+(has("hookIdea","researchProject")?1:0)+(has("academicAwards","mainSportAwards")?1:0),5);
    const clubs=cap(leadershipScore + ecStrength*2 + (filled(["clubs","mainSport","instrument","serviceActivities"])>=3?5:2),20);
    const arts=cap((has("instrument")?3:0)+(has("musicAwards")?2:0)+(has("dramaExp")&&!/없음|none|미경험/.test(String(d.dramaExp))?3:0)+(has("visualArts","otherArts")?2:0),10);
    const sports=cap((has("mainSport")?5:0)+(has("mainSportAwards")?4:0)+(has("mainSportLevel")?2:0)+(has("fallSport","winterSport","springSport")?2:0)+(has("coachInfo")?2:0),15);
    const misc=cap((has("academicAwards")?3:0)+(has("researchProject","hookIdea")?3:0)+(has("mainHook")?2:0)+(has("writingExp","hobbies")?2:0),10);
    const total=cap(Math.round(academics+testing+culture+clubs+arts+sports+misc),100);

    const benchmark=BENCHMARKS.slice().sort((a,b)=>
      Math.abs((ssat||70)-a.ssat)+Math.abs((toefl||100)-a.toefl)+Math.abs(hookScore-a.hook)
      -(Math.abs((ssat||70)-b.ssat)+Math.abs((toefl||100)-b.toefl)+Math.abs(hookScore-b.hook))
    )[0];

    const strengths=[
      ssat>=90 && `SSAT ${ssat}%는 Reach 학교군에서도 검토 가능한 시험 기반입니다. 특히 Math ${d.ssatMath||"강점"}가 높다면 Exeter·Andover형 학업 리스크를 낮출 수 있습니다.`,
      toefl>=105 && `TOEFL ${toefl}점은 국제학생 영어 리스크를 크게 줄입니다. 인터뷰 훈련과 연결하면 School Culture 점수 상승 여지가 큽니다.`,
      has("mainSport","mainSportAwards") && `${d.mainSport} 활동은 Sports 15점 중 임팩트/포텐셜을 동시에 만들 수 있는 축입니다. 코치 추천, 영상, 대회명으로 검증 가능성을 높이면 학교별 Fit이 선명해집니다.`,
      has("academicAwards","specialSubject","researchProject") && `${d.specialSubject||"학업"} 강점과 ${d.researchProject||"수상/연구"} 경험은 Misc/Hook 10점과 Academics 20점을 함께 끌어올릴 수 있습니다.`,
      has("leadershipRoles","serviceActivities") && `리더십·봉사 기록은 Inboardy 모델의 School Culture 20점에서 핵심입니다. 역할, 기관, 누적시간을 공식 기록으로 정리하면 추천서 소재가 됩니다.`,
      has("instrument","dramaExp","visualArts") && `예술 활동은 Arts 10점에서 보조 차별화 요소입니다. 특히 연극·공연·포트폴리오 형태로 학교 커뮤니티 기여도를 보여줄 수 있습니다.`
    ].filter(Boolean).slice(0,4);

    const weaknesses=[
      !ssat && "SSAT 데이터가 없습니다. 엑셀 모델 기준 Reach 학교는 SSAT 95%+, Target도 85~92%가 안전하므로 우선 진단 시험이 필요합니다.",
      ssat && ssat<85 && `SSAT ${ssat}%는 상위 20개 보딩 기준으로 시험 리스크가 큽니다. Reading/Verbal을 분리해 1차 목표 85%, 최종 90%+로 끌어올려야 합니다.`,
      toefl && toefl<100 && `TOEFL ${toefl}점은 ESL/국제학생 검토에서 약점이 됩니다. 최소 100+, 상위권은 105~110+를 목표로 해야 합니다.`,
      !has("serviceActivities") && "봉사활동 공식 기록이 부족합니다. School Culture 루브릭의 봉사 5점을 위해 기관명, 역할, 누적시간, 증빙 가능성을 만들어야 합니다.",
      !has("leadershipRoles") && "리더십 직함이 부족합니다. Clubs & Activities 20점에서 리더 5점이 비어 보일 수 있으므로 클럽 임원·프로젝트 리더 역할이 필요합니다.",
      !has("mainHook","hookIdea") && "Hook이 아직 약합니다. 합격자 데이터에서 강한 학생은 EC Strength 4~5, Hook 4~5를 보이므로 한 문장 Specialty가 필요합니다.",
      !has("recLetterCandidates") && "추천서 후보가 정리되지 않았습니다. Current Teacher, Student Life, 특기 코치/멘토 추천서를 분리해야 합니다."
    ].filter(Boolean).slice(0,5);

    const bestHook=d.mainHook || d.hookIdea || [
      d.mainSport && `${d.mainSport}를 중심으로 학업적 호기심과 성실한 훈련 태도를 함께 보여주는 학생`,
      d.specialSubject && `${d.specialSubject} 강점을 실제 프로젝트와 캠퍼스 기여로 확장할 수 있는 학생`,
      "성실한 학업 태도와 다양한 활동 경험을 바탕으로 보딩 커뮤니티에 기여할 수 있는 학생"
    ].filter(Boolean)[0];

    const requestedSchools=(d.dreamSchools+"\n"+d.matchSchools+"\n"+d.safetySchools).split(/[,·\n]/).map(s=>s.trim()).filter(Boolean);
    const findSchool=(name)=>SCHOOL_DB.find(s=>s.name.toLowerCase().includes(name.toLowerCase()) || name.toLowerCase().includes(s.name.toLowerCase().replace(" school","")));
    const basePool=requestedSchools.length?requestedSchools.map(n=>findSchool(n)||{name:n,ssat:92,accept:20,yesRank:null,niche:null,state:"",boarding:null,intl:null,profile:"사용자 지정 목표 학교"}):SCHOOL_DB;
    const schoolScore=(s)=>cap(100 - Math.abs((ssat||75)-(s.ssat||90))*1.6 - ((s.yesRank||40)/3) + (sports>=10 && /ski|sport|athletic|outdoor/i.test(s.profile)?8:0) + (toefl>=105?4:0),100);
    const schoolRows=basePool.map(s=>{
      const fit=schoolScore(s);
      const band=fit>=82?"Target/High Fit":fit>=70?"Balanced Target":fit>=58?"Reach": "High Reach";
      const after=fit>=78?"합격 가능":fit>=65?"준비 후 가능성 상승":"전략적 리치";
      return {...s,fit,band,after};
    }).sort((a,b)=>b.fit-a.fit).slice(0,6);

    const actions=[
      ssat>=90 ? "SSAT는 유지 전략으로 두고, 학교별 Why essay와 인터뷰 스크립트에 시간을 배분하세요." : "SSAT를 Reading/Verbal 중심으로 재설계하세요. 8주 단위 Mock → 오답 유형 → 단어/지문 루틴을 고정해야 합니다.",
      "활동은 나열이 아니라 Inboardy EC Strength 4~5로 보이도록 대회명, 역할, 기간, 임팩트, 추천 가능자를 표로 정리하세요.",
      "추천서는 학업 2명, Student Life 1명, 특기 코치/멘토 1명으로 분리하고 각 추천서가 증명할 문장을 미리 배정하세요.",
      "학교 리스트는 Reach 30%, Target 40%, Likely 30%로 재배치하고 각 학교의 SSAT 기준·합격률·보딩 비율을 비교하세요."
    ];
    const student=d.nameKo||"입력 학생";
    const studentLabel=student.endsWith("학생")?student:`${student} 학생`;
    const target=d.targetYear||d.targetGrade ? `${d.targetYear||"목표 연도"}년 ${d.targetGrade||"목표 학년"} 입학` : "목표 입학 정보 입력 필요";
    const goalScore=Math.max(total,Math.min(92,total+24));
    const gap=Math.max(0,goalScore-total);
    const activityScore=Math.min(25,Math.round(clubs + arts/2 + sports/2));
    const activityGoal=Math.min(25,activityScore+5);
    const spikeCount=[d.mainSport,d.specialSubject,d.instrument,d.mainHook].filter(Boolean).length||1;
    const schoolCount=schoolRows.length;
    const esc=(v)=>String(v||"—").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
    const itemHtml=(items,color)=>items.map(x=>`<div class="pr-diag-item"><span style="background:${color}"></span><p>${esc(x)}</p></div>`).join("");
    const fallbackStrengths=strengths.length?strengths:["입력된 학생 정보를 기반으로 강점 축을 구성할 수 있습니다. 활동별 기간, 수상, 역할을 추가하면 제안서 설득력이 높아집니다."];
    const fallbackWeaknesses=weaknesses.length?weaknesses:["현재 입력값 기준으로 치명적 공백은 크지 않습니다. 다만 시험, 추천서, 학교 리스트, Hook 문장을 더 구체화해야 합니다."];

    return `<div class="proposal-report">

        .pr-cover h1{font-family:'Noto Serif KR',serif;font-size:26px;line-height:1.35;margin-bottom:8px}
        .pr-cover h2{font-size:13px;font-weight:400;color:#bfdbfe;margin-bottom:22px}
        .pr-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;border-top:1px solid rgba(255,255,255,.16);padding-top:16px}
        .pr-meta small{display:block;font-size:9px;color:#93c5fd;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
        .pr-meta b{font-size:12px;font-weight:600}
        .pr-body{padding:28px 34px 34px}
        .pr-section{margin-top:34px}.pr-section:first-child{margin-top:0}
        .pr-hdr{display:flex;align-items:center;gap:9px;border-bottom:2px solid #1a2744;padding-bottom:7px;margin-bottom:16px}
        .pr-num{background:#1a2744;color:white;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
        .pr-title{font-size:15px;font-weight:800;color:#1a2744}.pr-sub{font-size:10px;color:#6b7280;margin-left:auto}
        .pr-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
        .pr-stat{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px}.pr-stat strong{display:block;font-size:21px}.pr-stat span{font-size:9px;color:#6b7280;line-height:1.35}
        .pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.pr-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
        .pr-card{border:1px solid #e5e7eb;border-radius:9px;padding:12px 14px;background:white;border-top:3px solid #2563a8}
        .pr-card h4{font-size:12px;margin-bottom:6px;color:#111827}.pr-card p,.pr-card li{font-size:11px;color:#374151;line-height:1.65}
        .pr-bar{height:7px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:8px 0}.pr-fill{height:100%;border-radius:99px}
        .pr-diag-item{display:flex;gap:7px;margin:7px 0}.pr-diag-item span{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none}.pr-diag-item p{margin:0;font-size:11px;line-height:1.65;color:#374151}
        .pr-note{background:#f0f7ff;border-left:4px solid #2563a8;border-radius:8px;padding:12px 14px;font-size:12px;line-height:1.7;color:#1f2937}
        .pr-table{width:100%;border-collapse:collapse;font-size:10.5px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}.pr-table th{background:#1a2744;color:white;text-align:left;padding:7px}.pr-table td{border-top:1px solid #e5e7eb;padding:7px;vertical-align:top}.pr-chip{display:inline-block;border-radius:20px;padding:2px 7px;font-size:9px;font-weight:700}.green{background:#d1fae5;color:#065f46}.amber{background:#fef3c7;color:#92400e}.red{background:#fee2e2;color:#991b1b}.blue{background:#dbeafe;color:#1e40af}.purple{background:#ede9fe;color:#4c1d95}
        @media(max-width:760px){.pr-body,.pr-cover{padding-left:18px;padding-right:18px}.pr-meta,.pr-stats,.pr-grid,.pr-grid3{grid-template-columns:1fr}.pr-sub{display:none}}
      </style>
      <div class="pr-cover">
        <div class="pr-logo">예스유학 · 시니어보딩 프렙 프로그램</div>
        <h1>${esc(studentLabel)}<br>탑 시니어보딩스쿨 합격 전략 제안서</h1>

          <div><small>현재 학교</small><b>${esc(d.currentSchool||"입력 필요")}</b></div>
          <div><small>목표 입학</small><b>${esc(target)}</b></div>
          <div><small>작성 기준</small><b>Tool 1 입력 데이터</b></div>
        </div>
      </div>
      <div class="pr-body">
        <div class="pr-section">
          <div class="pr-hdr"><span class="pr-num">01</span><span class="pr-title">현재 학생 진단 — 예스유학 루브릭 분석</span><span class="pr-sub">총점 100점 기준</span></div>
          <div class="pr-stats">
            <div class="pr-stat"><strong style="color:#dc2626">${total}점</strong><span>현재 추정 총점<br>100점 기준</span></div>
            <div class="pr-stat"><strong style="color:#2563a8">${goalScore}점</strong><span>지원 목표 점수</span></div>
            <div class="pr-stat"><strong style="color:#d97706">+${gap}점</strong><span>향상 필요 점수</span></div>
            <div class="pr-stat"><strong style="color:#0d6e56">${spikeCount}개</strong><span>핵심 스파이크 후보</span></div>
            <div class="pr-stat"><strong style="color:#4c1d95">${schoolCount}개교</strong><span>목표 지원 학교군</span></div>
          </div>
          <div class="pr-grid">
            <div class="pr-card" style="border-top-color:#2563a8"><h4>Academics + Testing / 30점</h4><p>현재 ${Math.round(academics+testing)}점 → 목표 ${Math.min(30,Math.round(academics+testing+4))}점</p><div class="pr-bar"><div class="pr-fill" style="width:${(academics+testing)/30*100}%;background:#2563a8"></div></div><p>성적: ${esc(d.currentGrades||d.prevGrades)}<br>시험: SSAT ${esc(d.ssatOverall||"미입력")} / TOEFL ${esc(d.toeflScore||"미입력")}<br><b>모델 기준:</b> Reach는 SSAT 95%+, TOEFL 110+가 안정권</p></div>
            <div class="pr-card" style="border-top-color:#0d6e56"><h4>School Culture / 20점</h4><p>현재 ${Math.round(culture)}점 → 목표 ${Math.min(20,Math.round(culture+4))}점</p><div class="pr-bar"><div class="pr-fill" style="width:${culture/20*100}%;background:#0d6e56"></div></div><p>인터뷰 추정: ${Math.round(interview)}/10<br>봉사: ${esc(d.serviceActivities||d.serviceHours)}<br>Student Life 추천서: ${studentLifeReco}/5</p></div>
            <div class="pr-card" style="border-top-color:#7c3aed"><h4>Clubs & Activities / 25점</h4><p>현재 ${activityScore}점 → 목표 ${activityGoal}점</p><div class="pr-bar"><div class="pr-fill" style="width:${activityScore/25*100}%;background:#7c3aed"></div></div><p>스포츠: ${esc(d.mainSport)}<br>예술: ${esc(d.instrument||d.dramaExp||d.visualArts)}</p></div>
            <div class="pr-card" style="border-top-color:#c2410c"><h4>Misc. / Hook / 10점</h4><p>현재 ${Math.round(misc)}점 → 목표 ${Math.min(10,Math.round(misc+3))}점</p><div class="pr-bar"><div class="pr-fill" style="width:${misc/10*100}%;background:#c2410c"></div></div><p>Hook: ${esc(bestHook)}<br>벤치마크: ${esc(benchmark.name)}<br>학교 전략: ${esc(d.schoolPriority||"Dream/Target/Likely 재배치 필요")}</p></div>

            <div class="pr-card" style="border-top-color:#dc2626"><h4>⚠ 보완 필요 약점</h4>${itemHtml(fallbackWeaknesses,"#dc2626")}</div>
          </div>
        </div>

        <div class="pr-section">
          <div class="pr-hdr"><span class="pr-num">02</span><span class="pr-title">왜 바로 탑 보딩 합격이 어려운가 — 원인 분석</span><span class="pr-sub">전략적 준비 이유</span></div>
          <div class="pr-note"><b>핵심 진단:</b> 이 분석은 업로드된 Inboardy 루브릭과 학생 벤치마크를 기준으로 산출했습니다. 현재 프로필은 <b>${esc(benchmark.name)}</b>에 가장 가깝고, 합격 가능성을 높이려면 시험·추천서·EC Strength·Hook을 학교별 기준에 맞춰 증빙해야 합니다.</div>
          <div class="pr-grid3" style="margin-top:12px">
            <div class="pr-card" style="border-top-color:#dc2626"><h4>01. 시험 기준</h4><p>현재 SSAT ${esc(d.ssatOverall||"미입력")} / TOEFL ${esc(d.toeflScore||"미입력")}. 상위 10개교는 SSAT 94~97%, TOEFL 110+가 안정권입니다.</p></div>
            <div class="pr-card" style="border-top-color:#d97706"><h4>02. EC Strength</h4><p>현재 EC Strength 추정 ${ecStrength.toFixed(1)}/5. 합격자형 4~5점으로 보이려면 활동명보다 임팩트, 기간, 역할, 추천 가능자가 필요합니다.</p></div>
            <div class="pr-card" style="border-top-color:#7c3aed"><h4>03. Hook 지표</h4><p>Hook 추정 ${hookScore.toFixed(1)}/5. "${esc(bestHook)}"를 에세이·인터뷰·추천서에서 반복되는 핵심 문장으로 만들어야 합니다.</p></div>
          </div>
        </div>

    const leaderDetected=!noLeadership&&leaderKeyword.test(clubText);
    const leadershipAwardMeaningful=meaningful(d.leadershipAwards)&&!/없음|없다|none|no/i.test(String(d.leadershipAwards));
    const clubLeader=cap((leaderDetected?3:0)+(leadershipAwardMeaningful?1:0)+(leaderDetected&&clubItems.length>=3?1:0),5);
    const memberOnly=clubItems.length>0&&!leaderDetected&&clubItems.every(x=>/member|회원|참여|participant/i.test(x));
    const clubImpactRaw=cap((impactKeyword.test(d.clubs)?3:0)+(leadershipAwardMeaningful?2:0)+(has("academicAwards")?1:0)+(clubItems.length>=4?2:clubItems.length>=2?1:clubItems.length?0:0)+(leaderDetected?2:0),10);

      <div class="cover"><div class="logo">예스유학 · 전략 제안서</div><h1>${esc(student)} 학생<br>미국 보딩스쿨 합격 전략 제안서</h1><div class="subtitle">${esc(d.currentSchool||"현재 학교 미입력")} · ${esc(target)} 목표 · Tool 1 입력 데이터 기반 자동 분석</div><div class="meta"><div><span class="meta-lbl">Student</span><span class="meta-val">${esc(student)}</span></div><div><span class="meta-lbl">Current</span><span class="meta-val">${esc(d.currentGrade||"미입력")}</span></div><div><span class="meta-lbl">Target</span><span class="meta-val">${esc(target)}</span></div><div><span class="meta-lbl">Model</span><span class="meta-val">Rubric + 합격자 데이터</span></div></div></div>
      <div class="content">
        <div class="section"><div class="sec-hdr"><span class="sec-num">01</span><span class="sec-title">현재 학생 진단 — 예스유학 루브릭 분석</span><span class="sec-sub">총점 100점 기준</span></div>
          <div class="stat-row"><div class="stat-card"><div class="stat-val" style="color:#dc2626">${total}점</div><div class="stat-lbl">현재 추정 총점</div></div><div class="stat-card"><div class="stat-val" style="color:#2563a8">${goalScore}점</div><div class="stat-lbl">지원 목표 점수</div></div><div class="stat-card"><div class="stat-val" style="color:#d97706">+${gap}점</div><div class="stat-lbl">보완 필요 점수</div></div><div class="stat-card"><div class="stat-val" style="color:#0d6e56">${[d.mainSport,d.specialSubject,d.instrument,d.mainHook].filter(Boolean).length||1}개</div><div class="stat-lbl">스파이크 후보</div></div><div class="stat-card"><div class="stat-val" style="color:#4c1d95">${rows.length}개교</div><div class="stat-lbl">분석 학교</div></div></div>
          <div class="rubric-grid">
            <div class="rub-card" style="border-top:3px solid #2563a8"><div class="rub-title">School Academics <span class="rub-pts">/ 20점</span></div><div class="rub-now" style="color:#2563a8">현재 ${academics}점 · 목표 ${Math.min(20,academics+3)}점</div><div class="rub-bar"><div class="rub-bar-fill" style="width:${academics/20*100}%;background:#2563a8"></div></div><div class="rub-items"><b>이전 성적(5):</b> ${prevGrade}/5 · ${esc(d.prevGrades)}<br><b>현재 성적(10):</b> ${currentGrade}/10 · ${esc(d.currentGrades)}<br><b>Academic 추천서(5):</b> ${academicReco}/5 · ${esc(d.recLetterCandidates)}</div></div>
            <div class="rub-card" style="border-top:3px solid #0d6e56"><div class="rub-title">School Culture <span class="rub-pts">/ 20점</span></div><div class="rub-now" style="color:#0d6e56">현재 ${culture}점 · 목표 ${Math.min(20,culture+4)}점</div><div class="rub-bar"><div class="rub-bar-fill" style="width:${culture/20*100}%;background:#0d6e56"></div></div><div class="rub-items"><b>인터뷰(10):</b> ${interview}/10 · TOEFL ${toefl||"미입력"} 및 성격/학교조사 기반<br><b>Student Life 추천서(5):</b> ${lifeReco}/5<br><b>봉사(5):</b> ${service}/5 · ${esc(d.serviceActivities||d.serviceHours)}</div></div>
            <div class="rub-card" style="border-top:3px solid #7c3aed"><div class="rub-title">Clubs & Activities <span class="rub-pts">/ 20점</span></div><div class="rub-now" style="color:#7c3aed">현재 ${clubs}점 · 목표 ${Math.min(20,clubs+6)}점</div><div class="rub-bar"><div class="rub-bar-fill" style="width:${clubs/20*100}%;background:#7c3aed"></div></div><div class="rub-items"><b>리더(5):</b> ${clubLeader}/5 · 공식 직함/대표 역할만 반영<br><b>임팩트(10):</b> ${clubImpact}/10 · 수상·대회·프로젝트·커뮤니티 결과물 기준<br><b>기간(5):</b> ${clubDuration}/5 · 지속 기간과 누적성 기준<br><b>입력 활동:</b> ${esc(d.clubs)}</div></div>
            <div class="rub-card" style="border-top:3px solid #c2410c"><div class="rub-title">Sports + Arts + Misc <span class="rub-pts">/ 35점</span></div><div class="rub-now" style="color:#c2410c">현재 ${sportsArtsMisc}점 · 목표 ${Math.min(35,sportsArtsMisc+6)}점</div><div class="rub-bar"><div class="rub-bar-fill" style="width:${sportsArtsMisc/35*100}%;background:#c2410c"></div></div><div class="rub-items"><b>Sports(15):</b> ${sports}/15 · ${esc(d.mainSport||d.fallSport||d.winterSport)}<br><b>Arts(10):</b> ${arts}/10 · Music ${music}/5, Theater/Visual ${artsOther}/5<br><b>Misc/Hook(10):</b> ${misc}/10 · ${esc(topHook)}</div></div>
          </div>
          <div class="sub-hdr">강점 / 약점 종합</div><div class="diag-grid"><div class="diag-card" style="border-top:3px solid #16a34a"><div class="diag-title" style="color:#15803d">핵심 강점과 근거</div>${strengthItems.map(x=>`<div class="diag-item"><span class="diag-dot" style="background:#16a34a"></span><span>${x}</span></div>`).join("")}</div><div class="diag-card" style="border-top:3px solid #dc2626"><div class="diag-title" style="color:#dc2626">보완 필요 항목과 근거</div>${weakItems.map(x=>`<div class="diag-item"><span class="diag-dot" style="background:#dc2626"></span><span>${x}</span></div>`).join("")}</div></div>
        </div>
        <div class="section"><div class="sec-hdr"><span class="sec-num">02</span><span class="sec-title">왜 탑 시니어보딩에 바로 합격이 어려운가 — 7가지 원인 분석</span><span class="sec-sub">루브릭 gap 분석</span></div><div class="highlight-box"><b>핵심 판단:</b> 현재 총점은 ${total}점입니다. 합격자 데이터에서 상위권 학생은 시험, EC Strength, 리더십, Hook이 동시에 4~5 수준으로 보이는데, 이 학생은 특히 Clubs & Activities가 ${clubs}/20으로 별도 보완이 필요합니다.</div><div class="reject-grid" style="margin-top:14px">${rejectData.map(r=>`<div class="reject-card"><div class="reject-num">${r[0]}</div><div class="reject-title">${r[1]}</div><div class="reject-body">${r[2]}</div><div class="reject-solution">→ ${r[3]}</div></div>`).join("")}</div></div>
        <div class="section"><div class="sec-hdr"><span class="sec-num">03</span><span class="sec-title">아카데믹 플랜 — 내신 · SSAT · 추천서</span></div><div class="sub-hdr">3-1. 과목별 내신 전략</div><div class="tbl-wrap"><table><thead><tr><th>과목</th><th>현재 강점</th><th>목표</th><th>전략</th></tr></thead><tbody><tr><td>English / Humanities</td><td>${esc(d.englishLevel||d.currentGrades)}</td><td>A/A+와 글쓰기 증거</td><td>주 1회 에세이, 독서 로그, 인터뷰 답변 문장화</td></tr><tr><td>Math / Science</td><td>${esc(d.specialSubject||d.academicAwards)}</td><td>수상 또는 프로젝트 산출물</td><td>대회 결과와 연구 주제를 Hook과 연결</td></tr><tr><td>Recommendation</td><td>${esc(d.recLetterCandidates)}</td><td>Academic 2명 + Life 1명</td><td>각 교사에게 증명할 문장과 사례를 사전 배정</td></tr></tbody></table></div><div class="sub-hdr">3-2. SSAT 전략 & 일정</div><div class="ssat-grid"><div class="diag-card"><div class="diag-title">Math</div><p>현재 ${esc(d.ssatMath)}. 강점이면 유지 훈련, 약점이면 계산 속도와 오답 유형을 고정합니다.</p></div><div class="diag-card"><div class="diag-title">Reading</div><p>현재 ${esc(d.ssatReading)}. 상위권 보딩은 긴 지문 추론과 어휘 문맥 문제가 핵심입니다.</p></div><div class="diag-card"><div class="diag-title">Verbal</div><p>현재 ${esc(d.ssatVerbal)}. 2,000단어 루틴과 analogy/synonym 오답 노트를 운영합니다.</p></div></div><div class="sub-hdr">3-3. Recommendation 전략</div><div class="rec-grid"><div class="diag-card"><div class="diag-title">Academic</div><p>성적 우수함보다 수업 기여, 질문의 깊이, 피드백 반영 사례를 요청합니다.</p></div><div class="diag-card"><div class="diag-title">Student Life</div><p>기숙사/커뮤니티에서 신뢰받을 학생이라는 근거가 필요합니다.</p></div><div class="diag-card"><div class="diag-title">Spike Mentor</div><p>${esc(topHook)}를 외부 시선으로 증명할 코치·멘토 추천을 확보합니다.</p></div></div></div>
        <div class="section"><div class="sec-hdr"><span class="sec-num">04</span><span class="sec-title">EC 플랜 — 시즌별 활동 전략</span></div><div class="season-grid"><div class="season-card"><div class="season-title">Fall</div><div class="season-item">클럽은 단순 참여가 아니라 한 가지 산출물의 owner가 되어야 합니다.</div><div class="season-item">${esc(d.fallSport||"가을 스포츠/활동 입력 필요")}</div></div><div class="season-card"><div class="season-title">Winter</div><div class="season-item">${esc(d.winterSport||d.mainSport||"겨울 대표 활동 입력 필요")}</div><div class="season-item">코치/지도자의 관찰 문장을 추천서 자산으로 축적합니다.</div></div><div class="season-card"><div class="season-title">Spring</div><div class="season-item">${esc(d.springSport||"봄 활동 입력 필요")}</div><div class="season-item">봉사 또는 리더십 프로젝트를 마감 결과물로 만듭니다.</div></div></div><div class="note-box" style="margin-top:12px">Clubs & Activities는 스포츠/아트와 분리했습니다. 따라서 클럽 멤버십 2개만 있는 학생은 리더, 임팩트, 기간 증거가 없으면 높은 점수를 받지 않습니다.</div></div>
        <div class="section"><div class="sec-hdr"><span class="sec-num">05</span><span class="sec-title">방학 일정 & 세부 액션 플랜</span></div><div class="vac-grid"><div class="vac-card"><b>Thanksgiving</b><p>학교별 Why 자료와 인터뷰 답변 초안 작성</p></div><div class="vac-card"><b>Winter</b><p>${esc(d.winterActivity||"SSAT 보완, 봉사 증빙, 대표 활동 결과물 정리")}</p></div><div class="vac-card"><b>Spring</b><p>추천서 후보 미팅과 활동 산출물 1차 완성</p></div><div class="vac-card"><b>Summer</b><p>${esc(d.summerActivity||"캠프/연구/대회/포트폴리오 중 하나를 공식 결과물로 완성")}</p></div></div></div>
        <div class="section"><div class="sec-hdr"><span class="sec-num">06</span><span class="sec-title">Hook & Special Interest — 3대 스파이크 기획</span></div><div class="hook-card"><div class="hook-hdr">Spike 1. 대표 Hook</div><div class="hook-grid"><div><b>현재 소재</b><p>${esc(topHook)}</p></div><div><b>증명 자료</b><p>${esc(d.mainSportAwards||d.academicAwards||d.researchProject)}</p></div><div><b>지원서 문장</b><p>“나는 이 관심사를 학교 커뮤니티 안에서 실제 기여로 바꾸는 학생”으로 정리합니다.</p></div></div></div><div class="hook-card" style="margin-top:12px"><div class="hook-hdr">Spike 2. Academic + Activity 연결</div><p>${esc(d.specialSubject||"학업 강점")}을 ${esc(d.clubs||"클럽/프로젝트")}와 연결해 한 개의 깊은 프로젝트로 만듭니다.</p></div><div class="hook-card" style="margin-top:12px"><div class="hook-hdr">Spike 3. Community Contribution</div><p>${esc(d.serviceActivities||"봉사/커뮤니티 기여")}를 누적 시간, 역할, 결과물, 추천 가능자로 증명합니다.</p></div></div>
        <div class="section"><div class="sec-hdr"><span class="sec-num">07</span><span class="sec-title">예스유학 Student Gateway — 향후 아웃컴 예측</span></div><div class="tbl-wrap"><table class="gateway-tbl"><thead><tr><th>학교</th><th>학교 데이터</th><th>현재 진단</th><th>보완 후 전망</th><th>핵심 근거</th></tr></thead><tbody>${rows.map(s=>`<tr><td><b>${esc(s.name)}</b></td><td>Yes Rank ${esc(s.yesRank)} · Niche ${esc(s.niche)}<br>SSAT 기준 ${esc(s.ssat)}% · 합격률 ${esc(s.accept)}%</td><td><span class="outcome-chip ${chipClass(s.band)}">${s.band}</span><br>Fit ${s.fit}/100</td><td>${s.after}</td><td>${esc(s.profile)}</td></tr>`).join("")}</tbody></table></div><div class="note-box" style="margin-top:12px"><b>리스트 전략:</b> Dream은 시험과 Hook 기준을 먼저 맞추고, Target은 클럽 리더십/봉사 증빙으로 합격 가능성을 올리며, Likely는 학생의 현재 강점이 바로 읽히는 학교로 배치합니다.</div></div>
        <div class="section"><div class="sec-hdr"><span class="sec-num">08</span><span class="sec-title">앤도버 · 엑시터 진단표 — 합격 기준 vs 현재 수준</span></div><div class="diag-school-grid"><div class="diag-school-card"><div class="dsc-title">Phillips Academy Andover</div><div class="dsc-row"><span>SSAT</span><span>97%권</span><span><span class="traffic ${ssat>=95?"t-green":ssat>=88?"t-yellow":"t-red"}">${ssat||"미입력"}</span></span></div><div class="dsc-row"><span>Academics</span><span>최상위 내신+추천서</span><span>${academics}/20</span></div><div class="dsc-row"><span>Leadership/EC</span><span>명확한 임팩트</span><span>${clubs}/20</span></div></div><div class="diag-school-card"><div class="dsc-title">Phillips Exeter Academy</div><div class="dsc-row"><span>SSAT</span><span>96%권</span><span><span class="traffic ${ssat>=95?"t-green":ssat>=88?"t-yellow":"t-red"}">${ssat||"미입력"}</span></span></div><div class="dsc-row"><span>Harkness Fit</span><span>토론·글쓰기·질문</span><span>${interview}/10</span></div><div class="dsc-row"><span>Specialty</span><span>기억나는 한 문장</span><span>${misc}/10</span></div></div></div><div class="sub-hdr">앤도버·엑시터 합격을 위한 체크리스트</div><div class="diag-grid"><div class="diag-card"><div class="diag-title">필수 보완</div><p>SSAT 95%+, Clubs 리더/임팩트/기간 증거, Academic 추천서 2명, Student Life 추천서 1명.</p></div><div class="diag-card"><div class="diag-title">합격 서사</div><p>${esc(topHook)}를 학교 커뮤니티에서 어떻게 확장할지 에세이와 인터뷰에서 반복합니다.</p></div></div></div>
      </div>
    </div>`;
  };

  const analyze=()=>{
    setLoading(true);
    setTimeout(()=>{
      setAi(localAnalysisTool2());
      setLoading(false);
    },350);
  };

  const pick=(text,regex)=>{
    const m=text.match(regex);
    return m ? m[1].trim().replace(/^—$/,"") : "";
  };

  const parseCopiedData=(text)=>{
    const next={...init};
    const basicMatch=text.match(/이름:\s*([^(\n|]+?)(?:\s*\(([^)]*)\))?\s*\|\s*성별:\s*([^|]*)\|\s*생년:\s*([^\n]*)/);
    if(basicMatch){
      next.nameKo=basicMatch[1].trim();
      next.nameEn=(basicMatch[2]||"").trim();
      next.gender=(basicMatch[3]||"").trim();
      next.birthdate=(basicMatch[4]||"").trim();
    }
    const currentMatch=text.match(/현재:\s*([^/\n]*)\/\s*([^\n]*)/);
    if(currentMatch){ next.currentSchool=currentMatch[1].trim(); next.currentGrade=currentMatch[2].trim(); }
    const targetMatch=text.match(/지원:\s*([^|]*)\|\s*목표:\s*([^년\n]*)년\s*([^\n]*)\s*입학/);
    if(targetMatch){ next.appType=targetMatch[1].trim(); next.targetYear=targetMatch[2].trim(); next.targetGrade=targetMatch[3].trim(); }
    const nationalityMatch=text.match(/국적:\s*([^|]*)\|\s*가족:\s*([^\n]*)/);
    if(nationalityMatch){ next.nationality=nationalityMatch[1].trim(); next.familyBackground=nationalityMatch[2].trim(); }
    next.prevGrades=pick(text,/이전 성적:\s*([\s\S]*?)\n현재 성적:/);
    next.currentGrades=pick(text,/현재 성적:\s*([\s\S]*?)\nSSAT:/);
    const ssatMatch=text.match(/SSAT:\s*전체\s*([^%|\n]*)%?\s*\|\s*Math\s*([^%|\n]*)%?\s*\|\s*Reading\s*([^%|\n]*)%?\s*\|\s*Verbal\s*([^%|\n]*)%?/);
    if(ssatMatch){ next.ssatOverall=ssatMatch[1].trim(); next.ssatMath=ssatMatch[2].trim(); next.ssatReading=ssatMatch[3].trim(); next.ssatVerbal=ssatMatch[4].trim(); }
    const toeflMatch=text.match(/TOEFL:\s*([^|]*)\|\s*영어:\s*([^\n]*)/);
    if(toeflMatch){ next.toeflScore=toeflMatch[1].trim(); next.englishLevel=toeflMatch[2].trim(); }
    next.academicAwards=pick(text,/학업수상:\s*([\s\S]*?)\n특기과목:/);
    const subjectMatch=text.match(/특기과목:\s*([^|]*)\|\s*연구:\s*([^\n]*)/);
    if(subjectMatch){ next.specialSubject=subjectMatch[1].trim(); next.researchProject=subjectMatch[2].trim(); }
    next.academicPrograms=pick(text,/특별프로그램:\s*([\s\S]*?)\n\n\[스포츠\]/);
    const sportMatch=text.match(/주력:\s*([^/\n]*)\/\s*([^/\n]*)년\s*\/\s*([^\n]*)/);
    if(sportMatch){ next.mainSport=sportMatch[1].trim(); next.mainSportYears=sportMatch[2].trim(); next.mainSportLevel=sportMatch[3].trim(); }
    next.mainSportAwards=pick(text,/주력수상:\s*([\s\S]*?)\n가을:/);
    const seasonMatch=text.match(/가을:\s*([^|]*)\|\s*겨울:\s*([^|]*)\|\s*봄:\s*([^\n]*)/);
    if(seasonMatch){ next.fallSport=seasonMatch[1].trim(); next.winterSport=seasonMatch[2].trim(); next.springSport=seasonMatch[3].trim(); }
    next.allSportAwards=pick(text,/전체수상:\s*([\s\S]*?)\n자격증:/);
    const sportEtcMatch=text.match(/자격증:\s*([^|]*)\|\s*훈련:\s*([^|]*)\|\s*코치:\s*([^\n]*)/);
    if(sportEtcMatch){ next.sportCertificates=sportEtcMatch[1].trim(); next.trainingHours=sportEtcMatch[2].trim(); next.coachInfo=sportEtcMatch[3].trim(); }
    const musicMatch=text.match(/음악:\s*([^/\n]*)\/\s*([^/\n]*)년\s*\/\s*([^\n]*)/);
    if(musicMatch){ next.instrument=musicMatch[1].trim(); next.musicYears=musicMatch[2].trim(); next.musicLevel=musicMatch[3].trim(); }
    next.musicAwards=pick(text,/음악수상:\s*([\s\S]*?)\n연극:/);
    const dramaMatch=text.match(/연극:\s*([^-|\n]*)\s*-\s*([^\n]*)/);
    if(dramaMatch){ next.dramaExp=dramaMatch[1].trim(); next.dramaDetails=dramaMatch[2].trim(); }
    const artsMatch=text.match(/시각예술:\s*([^|]*)\|\s*기타:\s*([^\n]*)/);
    if(artsMatch){ next.visualArts=artsMatch[1].trim(); next.otherArts=artsMatch[2].trim(); }
    next.leadershipRoles=pick(text,/리더십:\s*([\s\S]*?)\n봉사:/);
    const serviceMatch=text.match(/봉사:\s*([\s\S]*?)\s*\(([^)]*)\)\n클럽:/);
    if(serviceMatch){ next.serviceActivities=serviceMatch[1].trim(); next.serviceHours=serviceMatch[2].trim(); }
    next.clubs=pick(text,/클럽:\s*([\s\S]*?)\n수상:/);
    next.leadershipAwards=pick(text,/수상:\s*([\s\S]*?)\n\n\[Hook & 관심사\]/);
    next.mainHook=pick(text,/메인 Hook:\s*([\s\S]*?)\nHook 아이디어:/);
    next.hookIdea=pick(text,/Hook 아이디어:\s*([\s\S]*?)\n취미:/);
    const hobbyMatch=text.match(/취미:\s*([^|]*)\|\s*글쓰기:\s*([^\n]*)/);
    if(hobbyMatch){ next.hobbies=hobbyMatch[1].trim(); next.writingExp=hobbyMatch[2].trim(); }
    next.dreamSchools=pick(text,/드림:\s*([\s\S]*?)\n매치:/);
    next.matchSchools=pick(text,/매치:\s*([\s\S]*?)\n세이프티:/);
    next.safetySchools=pick(text,/세이프티:\s*([\s\S]*?)\n지역:/);
    const regionMatch=text.match(/지역:\s*([^|]*)\|\s*예산:\s*([^\n]*)/);
    if(regionMatch){ next.locationPref=regionMatch[1].trim(); next.budget=regionMatch[2].trim(); }
    const historyMatch=text.match(/이력:\s*([^|]*)\|\s*우선순위:\s*([^\n]*)/);
    if(historyMatch){ next.prevApps=historyMatch[1].trim(); next.schoolPriority=historyMatch[2].trim(); }
    next.summerActivity=pick(text,/여름:\s*([\s\S]*?)\n겨울:/);
    next.winterActivity=pick(text,/겨울:\s*([\s\S]*?)\n캠프:/);
    next.academicCamps=pick(text,/캠프:\s*([\s\S]*?)\n추천서후보:/);
    next.recLetterCandidates=pick(text,/추천서후보:\s*([\s\S]*?)\n학생성격:/);
    next.studentPersonality=pick(text,/학생성격:\s*([\s\S]*?)\n요청사항:/);
    next.parentRequests=pick(text,/요청사항:\s*([\s\S]*)/);
    Object.keys(next).forEach(k=>{ if(next[k]==="—" || next[k]==="미입력") next[k]=""; });
    return next;
  };

  const importAndGenerate=()=>{
    const raw=importText.trim();
    if(!raw){
      setImportErr("복사한 학생 데이터를 붙여넣어 주세요.");
      return;
    }
    if(!raw.includes("예스유학 학생 정보") && !raw.includes("[기본 정보]")){
      setImportErr("Tool 1에서 복사한 학생 데이터 형식인지 확인해 주세요.");
      return;
    }
    const next=parseCopiedData(raw);
    setD(next);
    setStep(9);
    setAi(localAnalysisTool2(next));
    setStartMode("form");
    setImportErr("");
  };

  const copy=()=>{
    const cleanAi=ai?ai.replace(/<style[\s\S]*?<\/style>/g,"").replace(/<br\s*\/?>/g,"\n").replace(/<\/(div|p|h1|h2|h3|h4|tr)>/g,"\n").replace(/<[^>]+>/g,"").replace(/\n{3,}/g,"\n\n").trim():"";
    const full=txt()+(cleanAi?"\n\n[제안서 분석 결과]\n"+cleanAi:"");
    navigator.clipboard.writeText(full).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
  };

  const changeApiKey=()=>{
    sessionStorage.removeItem("yes_apikey");
    setApiKey(null);
    setAi("");
  };

  const BtnStyle=(color,disabled)=>({
    width:"100%",padding:"13px",background:disabled?"#9ca3af":color,
    color:"white",border:"none",borderRadius:10,fontSize:14,fontWeight:700,
    cursor:disabled?"not-allowed":"pointer",marginBottom:10
  });

  if(startMode==="start") return(
    <div style={{fontFamily:"'Apple SD Gothic Neo','Malgun Gothic',sans-serif",background:"#f3f4f6",minHeight:"100vh",padding:"28px 14px"}}>
      <div style={{maxWidth:820,margin:"0 auto"}}>
        <div style={{background:NAVY,color:"white",borderRadius:14,padding:"30px 34px",marginBottom:16,boxShadow:"0 2px 18px rgba(0,0,0,0.12)"}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:"#93c5fd",marginBottom:14}}>예스유학 · YES Study Abroad</div>
          <div style={{fontSize:26,fontWeight:800,lineHeight:1.3,marginBottom:8}}>학생 제안서 생성</div>
          <div style={{fontSize:13,color:"#bfdbfe",lineHeight:1.7}}>복사해둔 학생 데이터가 있으면 바로 Tool 2 형식의 전략 제안서로 만들 수 있습니다.</div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>
          <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"22px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,marginBottom:10}}>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:NAVY}}>기존 데이터로 제안서 만들기</div>
                <div style={{fontSize:12,color:"#6b7280",marginTop:3}}>Tool 1의 전체 데이터 복사 내용을 붙여넣으면 바로 분석 제안서가 생성됩니다.</div>
              </div>
              <span style={{background:"#dbeafe",color:"#1e40af",fontSize:10,fontWeight:800,borderRadius:999,padding:"4px 9px",whiteSpace:"nowrap"}}>빠른 생성</span>
            </div>
            <textarea value={importText} onChange={e=>{setImportText(e.target.value);setImportErr("");}}
              placeholder={"예스유학 학생 정보\n\n[기본 정보]\n이름: ...\n현재: ...\n지원: ..."}
              rows={13}
              style={{...iStyle,resize:"vertical",lineHeight:1.55,fontSize:12,marginBottom:8}} />
            {importErr&&<div style={{fontSize:11,color:"#dc2626",marginBottom:8}}>{importErr}</div>}
            <button onClick={importAndGenerate}
              style={{width:"100%",padding:"13px",background:"#065f46",color:"white",border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:"pointer"}}>
              붙여넣은 데이터로 Tool 2 형식 제안서 생성
            </button>
          </div>

          <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"22px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:15,fontWeight:800,color:NAVY,marginBottom:8}}>새 학생 정보 입력</div>
              <div style={{fontSize:12,color:"#6b7280",lineHeight:1.7,marginBottom:18}}>기존 복사 데이터가 없으면 8개 섹션을 차례로 입력한 뒤 제안서를 생성합니다.</div>
              <div style={{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:10,padding:"12px 14px",fontSize:11,color:"#374151",lineHeight:1.8}}>
                <div><b>01</b> 기본 정보</div>
                <div><b>02</b> 학업·시험</div>
                <div><b>03</b> 스포츠·예술·봉사</div>
                <div><b>04</b> 목표 학교·방학 계획</div>
              </div>
            </div>
            <button onClick={()=>{setStartMode("form");setStep(1);setAi("");}}
              style={{width:"100%",padding:"13px",background:NAVY,color:"white",border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:"pointer",marginTop:18}}>
              새로 입력 시작
            </button>
          </div>
        </div>
      </div>
    </div>
  );

  const shellMax=step===9?1180:720;
  return(
    <div style={{fontFamily:"'Apple SD Gothic Neo','Malgun Gothic',sans-serif",background:"#f3f4f6",minHeight:"100vh",padding:"20px 12px"}}>

      {/* HEADER */}
      <div style={{maxWidth:shellMax,margin:"0 auto 14px",display:"flex",justifyContent:"space-between",alignItems:"center",background:"white",padding:"12px 20px",borderRadius:12,boxShadow:"0 1px 8px rgba(0,0,0,0.08)"}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,color:NAVY,letterSpacing:"0.12em",textTransform:"uppercase"}}>예스유학 · YES Study Abroad</div>
          <div style={{fontSize:15,fontWeight:700,color:"#111827",marginTop:2}}>학생 제안서 입력 폼</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:18,fontWeight:700,color:step<9?sec.color:"#065f46"}}>{step<9?`${step}/8`:"✅"}</div>
            <div style={{fontSize:10,color:"#6b7280"}}>섹션</div>
          </div>
        </div>
      </div>

      {/* PROGRESS */}
      {step<9&&(
        <div style={{maxWidth:shellMax,margin:"0 auto 12px"}}>
          <div style={{background:"#e5e7eb",borderRadius:999,height:7,overflow:"hidden"}}>
            <div style={{background:sec.color,height:"100%",width:`${Math.round(((step-1)/8)*100)}%`,transition:"width 0.4s",borderRadius:999}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
            {SECTIONS.slice(0,8).map(ss=>(
              <div key={ss.id} onClick={()=>setStep(ss.id)} title={ss.title}
                style={{width:28,height:28,borderRadius:"50%",background:step>ss.id?"#d1fae5":step===ss.id?ss.color:"#e5e7eb",
                  border:`2px solid ${step>=ss.id?ss.color:"#d1d5db"}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:11,color:step>ss.id?TEAL:step===ss.id?"white":"#9ca3af",
                  fontWeight:700,cursor:"pointer",transition:"all 0.3s",flexShrink:0}}>
                {step>ss.id?"✓":ss.id}
              </div>
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
            {SECTIONS.slice(0,8).map(ss=>(
              <div key={ss.id} style={{fontSize:9,color:step>=ss.id?"#374151":"#9ca3af",textAlign:"center",width:28}}>{ss.icon}</div>
            ))}
          </div>
        </div>
      )}

      {/* CARD */}
      <div style={{maxWidth:shellMax,margin:"0 auto",background:step===9?"transparent":"white",borderRadius:step===9?0:14,boxShadow:step===9?"none":"0 2px 20px rgba(0,0,0,0.09)",overflow:step===9?"visible":"hidden"}}>
        {step<9&&(
          <div style={{background:sec.color,color:"white",padding:"14px 22px",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>{sec.icon}</span>
            <div>
              <div style={{fontSize:10,opacity:0.7,letterSpacing:"0.1em",textTransform:"uppercase"}}>섹션 {sec.id} / 8</div>
              <div style={{fontSize:17,fontWeight:700}}>{sec.title}</div>
            </div>
          </div>
        )}

        <div style={{padding:step===9?0:"22px 26px"}}>

          {step===1&&<div>
            <div style={{fontSize:11,color:"#6b7280",marginBottom:18,lineHeight:1.6,background:"#f9fafb",padding:"10px 14px",borderRadius:8}}>
              ● 필수 항목 · ○ 선택 항목 · 빠짐없이 입력할수록 제안서 품질이 높아집니다
            </div>
            <G2>
              <Field label="학생 이름 (한글)" required hint="예: 박은휴"><Inp value={d.nameKo} onChange={s("nameKo")} placeholder="홍길동"/></Field>
              <Field label="학생 이름 (영문)" required hint="여권 기준"><Inp value={d.nameEn} onChange={s("nameEn")} placeholder="HONG GILDONG"/></Field>
            </G2>
            <G2>
              <Field label="성별" required><Radio value={d.gender} onChange={s("gender")} options={[{v:"여",l:"여학생"},{v:"남",l:"남학생"}]}/></Field>
              <Field label="생년월일" required hint="YYYY.MM.DD"><Inp value={d.birthdate} onChange={s("birthdate")} placeholder="2013.05.15"/></Field>
            </G2>
            <G2>

          {step===4&&<div>

            </div>
          </div>}

          <div style={{display:"flex",justifyContent:"space-between",marginTop:26,paddingTop:16,borderTop:"1px solid #f3f4f6"}}>
            {step>1
              ?<button onClick={()=>setStep(p=>p-1)} style={{padding:"11px 22px",background:"#f9fafb",color:"#374151",border:"1px solid #e5e7eb",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:500}}>← 이전</button>
              :<div/>}
            {step<8
              ?<button onClick={()=>setStep(p=>p+1)} style={{padding:"11px 26px",background:sec.color,color:"white",border:"none",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:700}}>다음 →</button>
              :step===8
              ?<button onClick={()=>setStep(9)} style={{padding:"11px 26px",background:"#065f46",color:"white",border:"none",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:700}}>✅ 완료 & AI 분석</button>
              :null}
          </div>
        </div>
      </div>
      <div style={{maxWidth:shellMax,margin:"12px auto 0",textAlign:"center",fontSize:10,color:"#9ca3af",paddingBottom:20}}>
        예스유학 · YES Study Abroad · 학생 정보는 제안서 제작에만 사용됩니다
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
