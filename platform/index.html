<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예스유학 보딩스쿨 프렙 플랫폼</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif;background:#eef1f5;color:#111827}button,input,textarea,select{font-family:inherit}button{cursor:pointer}.app{min-height:100vh;display:grid;grid-template-columns:248px 1fr}.side{background:#17213a;color:#dbeafe;padding:22px 16px;position:sticky;top:0;height:100vh}.brand{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:#93c5fd;font-weight:800}.brand-title{font-size:21px;font-weight:900;color:white;margin:8px 0 22px}.userbox{border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:12px;margin-bottom:18px;background:rgba(255,255,255,.05)}.userbox b{display:block;color:white;font-size:13px}.userbox span{font-size:11px;color:#bfdbfe}.navbtn{width:100%;display:flex;align-items:center;gap:9px;border:0;background:transparent;color:#cbd5e1;padding:10px 11px;border-radius:8px;font-size:13px;text-align:left;margin:3px 0}.navbtn.active,.navbtn:hover{background:#243454;color:white}.main{padding:22px 28px 42px}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.topbar h1{font-size:24px;margin:0;color:#111827}.topbar p{font-size:12px;color:#6b7280;margin:4px 0 0}.btn{border:0;border-radius:8px;padding:10px 14px;font-size:12px;font-weight:800}.btn.primary{background:#1d4ed8;color:white}.btn.green{background:#047857;color:white}.btn.ghost{background:white;color:#374151;border:1px solid #d1d5db}.btn.warn{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}.grid{display:grid;gap:14px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.card{background:white;border:1px solid #d9dee8;border-radius:8px;padding:16px}.card h3{font-size:15px;margin:0 0 12px;color:#111827}.metric{display:flex;justify-content:space-between;align-items:flex-end}.metric strong{font-size:28px}.metric span{font-size:11px;color:#6b7280}.label{display:block;font-size:10px;font-weight:800;color:#4b5563;letter-spacing:.06em;text-transform:uppercase;margin:0 0 5px}.input,.textarea,.select{width:100%;border:1px solid #d1d5db;border-radius:7px;padding:9px 10px;font-size:13px;background:white}.textarea{min-height:72px;resize:vertical;line-height:1.55}.field{margin-bottom:12px}.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}.tab{border:1px solid #d1d5db;background:white;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:800;color:#374151}.tab.active{background:#17213a;color:white;border-color:#17213a}.table{width:100%;border-collapse:collapse;font-size:12px}.table th{background:#f3f4f6;color:#374151;text-align:left;padding:9px;border-bottom:1px solid #d1d5db}.table td{padding:9px;border-bottom:1px solid #e5e7eb;vertical-align:top}.pill{display:inline-block;border-radius:99px;padding:3px 8px;font-size:10px;font-weight:800}.p-blue{background:#dbeafe;color:#1e40af}.p-green{background:#d1fae5;color:#065f46}.p-amber{background:#fef3c7;color:#92400e}.p-red{background:#fee2e2;color:#991b1b}.student-row{display:grid;grid-template-columns:1.2fr .9fr .8fr .8fr auto;gap:12px;align-items:center;padding:13px;border:1px solid #e5e7eb;border-radius:8px;background:white;margin-bottom:8px}.progress{height:8px;border-radius:99px;background:#e5e7eb;overflow:hidden}.progress div{height:100%;background:#2563eb}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#17213a}.login-card{width:100%;max-width:440px;background:white;border-radius:12px;padding:30px;box-shadow:0 16px 60px rgba(0,0,0,.25)}.login-card h1{margin:0 0 6px;font-size:24px}.login-card p{margin:0 0 20px;color:#6b7280;font-size:13px;line-height:1.6}.schedule{display:grid;grid-template-columns:90px repeat(7,1fr);border:1px solid #d1d5db;border-radius:8px;overflow:hidden;background:white}.cell{border-right:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;min-height:54px;padding:7px;font-size:11px}.cell.head{background:#17213a;color:white;font-weight:800;min-height:auto}.cell.time{background:#f9fafb;font-weight:800;color:#4b5563}.report{background:white;border:1px solid #d1d5db;border-radius:8px;overflow:hidden}.report-cover{background:#17213a;color:white;padding:34px}.report-cover h2{font-size:28px;margin:0 0 8px}.report-body{padding:28px 34px}.section-title{display:flex;align-items:center;gap:8px;border-bottom:2px solid #17213a;padding-bottom:8px;margin:24px 0 14px;font-weight:900;color:#17213a}.section-title span{background:#17213a;color:white;border-radius:99px;padding:3px 9px;font-size:11px}.rubrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.rubric{border:1px solid #e5e7eb;border-top:3px solid #2563eb;border-radius:8px;padding:12px}.rubric b{display:block;font-size:13px;margin-bottom:6px}.rubric strong{font-size:22px}.muted{color:#6b7280}.small{font-size:11px;line-height:1.55}.right{display:flex;gap:8px;align-items:center}.hide{display:none}@media(max-width:920px){.app{grid-template-columns:1fr}.side{position:static;height:auto}.g2,.g3,.g4,.rubrics{grid-template-columns:1fr}.student-row{grid-template-columns:1fr}.main{padding:16px}.schedule{grid-template-columns:70px repeat(7,160px);overflow:auto}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useMemo,useState}=React;
const STORE="yes_prep_platform_v1";
const accounts=[
  {id:"admin",name:"관리자",role:"admin",email:"admin@yesuhak.com",password:"prep2026"},
  {id:"aram",name:"이아람",role:"staff",email:"aram@yesuhak.com",password:"prep2026"},
  {id:"consultant",name:"담당직원",role:"staff",email:"staff@yesuhak.com",password:"prep2026"}
];
const seed={
  students:[
    {id:"s1",name:"박은휴",en:"Eunhyu Park",owner:"aram",grade:"G7",school:"Indian Mountain School",status:"프렙 진행",target:"2027 G9",priority:"Hotchkiss, Exeter, Andover",progress:72,last:"2026-06-14",profile:"스키 + 수학 Hook. SSAT Reading/Verbal 보완 필요.",academics:[{term:"G6 Final",school:"Dulwich",gpa:"All A / Distinction",comment:"Excellent curiosity in math; should speak more in humanities discussions."}],tests:[{type:"SSAT",date:"2026.05",overall:"78",detail:"Math 99 / Reading 70 / Verbal 68"},{type:"TOEFL",date:"2026.04",overall:"108",detail:"Speaking 26"}],ecs:[{cat:"Sports",season:"Winter",name:"Alpine Ski",team:"KSA",from:"01.2021",to:"현재",hours:"12",position:"Racer",leadership:"Team mentor",impact:"전국 대회 1위"}],weekly:[["Mon","SSAT Verbal","17:00"],["Wed","Ski conditioning","18:00"],["Sat","Mock test","09:00"]],vacations:[{period:"Summer 2026",plan:"SSAT 90%+, ski camp, math research outline"}],tasks:[{text:"Hotchkiss coach email draft",done:false},{text:"Teacher recommendation evidence sheet",done:true}]},
    {id:"s2",name:"김테스트",en:"Test Kim",owner:"consultant",grade:"G8",school:"Seoul International School",status:"자료 수집",target:"2028 G9",priority:"Loomis, Taft, Berkshire",progress:38,last:"2026-06-12",profile:"클럽 멤버십 위주. 리더십/봉사 증빙 필요.",academics:[],tests:[{type:"SSAT",date:"2026.06",overall:"82",detail:"Math 94 / Reading 74 / Verbal 70"}],ecs:[{cat:"Club",season:"Year-round",name:"MUN",team:"School club",from:"09.2025",to:"현재",hours:"2",position:"Member",leadership:"",impact:"참여"}],weekly:[],vacations:[],tasks:[{text:"Transcript upload",done:false},{text:"EC impact interview",done:false}]}
  ],
  settings:{cycle:"2026 Fall Prep",rubric:"Academics 20 / Culture 20 / Clubs 20 / Sports+Arts+Misc 35 / Testing bonus 5"}
};
function load(){try{return JSON.parse(localStorage.getItem(STORE))||seed}catch(e){return seed}}
function save(data){localStorage.setItem(STORE,JSON.stringify(data))}
const blankStudent=()=>({id:"s"+Date.now(),name:"새 학생",en:"",owner:"aram",grade:"",school:"",status:"자료 수집",target:"",priority:"",deadline:"",advisor:"",dorm:"",tutoring:"",testPlan:"",projectPlan:"",notes:"",progress:10,last:new Date().toISOString().slice(0,10),profile:"",academics:[],tests:[],ecs:[],weekly:[],vacations:[],tasks:[],applications:[],roadmap:{}});
const roadmapCategories=[["sports","⚽ SPORTS","Explore → Specialize → Lead"],["arts","🎨 ARTS","Build portfolio → Showcase"],["clubs","🏆 CLUBS & LEADERSHIP","Join → Lead → Found"],["service","💝 SERVICE","Hours → Impact Story"],["projects","🚀 PROJECTS","Explore → Build → Showcase"],["tests","📝 TEST PREP","TOEFL/SSAT milestones"],["application","📩 APPLICATION","School list → Interviews → Submit"]];
const roadmapPeriods=["G6 Fall","G6 Winter","G6 Spring","G6 Summer","G7 Fall","G7 Winter","G7 Spring","G7 Summer","G8 Fall","G8 Winter","G8 Spring","G8 Summer","G9 Fall","G9 Winter","G9 Spring","Application"];
function score(st){const acad=Math.min(20,(st.academics.length?12:5)+(st.academics.some(a=>/A|Distinction|우수/i.test(a.gpa+a.comment))?5:0)+(st.academics.some(a=>a.comment)?3:0));const ssat=Number((st.tests.find(t=>t.type==="SSAT")||{}).overall)||0;const test=ssat>=95?5:ssat>=90?3:ssat>=80?1:0;const clubs=(()=>{let leader=st.ecs.some(e=>/captain|president|leader|회장|주장|리더/i.test(e.leadership+e.position))?5:0;let impact=st.ecs.some(e=>/1위|award|winner|수상|대회/i.test(e.impact))?7:st.ecs.length?3:0;let duration=st.ecs.some(e=>/현재|년|202/i.test(e.from+e.to))?3:0;return Math.min(20,leader+impact+duration)})();const culture=Math.min(20,(st.tasks.filter(t=>t.done).length*2)+8+(st.weekly.length?3:0));const sam=Math.min(35,(st.ecs.filter(e=>e.cat==="Sports").length?12:0)+(st.ecs.filter(e=>e.cat==="Arts").length?7:0)+(st.profile?8:0));return {acad,culture,clubs,sam,test,total:Math.min(100,acad+culture+clubs+sam+test)}}
function App(){const [data,setData]=useState(load());const [user,setUser]=useState(null);const [view,setView]=useState("dashboard");const [selected,setSelected]=useState(data.students[0]?.id);const [tab,setTab]=useState("overview");const [login,setLogin]=useState({email:"admin@yesuhak.com",password:"prep2026"});const persist=(next)=>{setData(next);save(next)};if(!user)return <Login login={login} setLogin={setLogin} onLogin={()=>{const a=accounts.find(x=>x.email===login.email&&x.password===login.password);if(a)setUser(a);else alert("계정을 확인하세요. 데모: admin@yesuhak.com / prep2026")}}/>;const visible=user.role==="admin"?data.students:data.students.filter(s=>s.owner===user.id);const st=data.students.find(s=>s.id===selected)||visible[0];const updateStudent=(patch)=>persist({...data,students:data.students.map(s=>s.id===st.id?{...s,...patch,last:new Date().toISOString().slice(0,10)}:s)});return <div className="app"><Sidebar user={user} view={view} setView={setView} logout={()=>setUser(null)}/><main className="main"><Header view={view}/>{view==="dashboard"&&<Dashboard user={user} students={visible} all={data.students} setView={setView} setSelected={setSelected}/>} {view==="students"&&<Students students={visible} all={data.students} selected={st} setSelected={setSelected} setView={setView} add={()=>{const ns=blankStudent();ns.owner=user.role==="admin"?"aram":user.id;persist({...data,students:[ns,...data.students]});setSelected(ns.id);setView("student")}}/>} {view==="student"&&st&&<StudentDetail st={st} tab={tab} setTab={setTab} update={updateStudent}/>} {view==="schedule"&&<Schedule students={visible}/>} {view==="reports"&&<Reports students={visible} selected={st} setSelected={setSelected}/>} {view==="admin"&&user.role==="admin"&&<Admin data={data} setSelected={setSelected} setView={setView}/>}</main></div>}
function Login({login,setLogin,onLogin}){return <div className="login"><div className="login-card"><div className="brand">YES Study Abroad</div><h1>보딩스쿨 프렙 플랫폼</h1><p>담당직원은 학생 정보를 입력·업데이트하고, 어드민은 전체 진행상황을 확인하는 LMS 프로토타입입니다.</p><div className="field"><span className="label">Email</span><input className="input" value={login.email} onChange={e=>setLogin({...login,email:e.target.value})}/></div><div className="field"><span className="label">Password</span><input className="input" type="password" value={login.password} onChange={e=>setLogin({...login,password:e.target.value})}/></div><button className="btn primary" style={{width:"100%"}} onClick={onLogin}>로그인</button><p className="small" style={{marginTop:14}}>데모 계정: admin@yesuhak.com / prep2026<br/>직원 계정: aram@yesuhak.com / prep2026</p></div></div>}
function Sidebar({user,view,setView,logout}){const items=[["dashboard","대시보드"],["students","학생 관리"],["schedule","주중·방학 일정"],["reports","보고서 제작"]];if(user.role==="admin")items.push(["admin","어드민"]);return <aside className="side"><div className="brand">YES Study Abroad</div><div className="brand-title">Prep LMS</div><div className="userbox"><b>{user.name}</b><span>{user.role==="admin"?"어드민 계정":"담당직원 계정"}</span></div>{items.map(i=><button key={i[0]} className={"navbtn "+(view===i[0]?"active":"")} onClick={()=>setView(i[0])}>{i[1]}</button>)}<button className="navbtn" style={{marginTop:18}} onClick={logout}>로그아웃</button></aside>}
function Header({view}){const titles={dashboard:"운영 대시보드",students:"학생 관리",student:"학생 상세",schedule:"주중·방학 일정",reports:"보고서 제작",admin:"어드민 대시보드"};return <div className="topbar"><div><h1>{titles[view]}</h1><p>학생 입력 → 진행 관리 → 전략 보고서 제작까지 이어지는 유학원 LMS 프로토타입</p></div><a className="btn ghost" href="../form/index.html">기존 Tool1 열기</a></div>}
function Dashboard({user,students,all,setView,setSelected}){const scores=students.map(score);const avg=Math.round(scores.reduce((a,b)=>a+b.total,0)/(scores.length||1));const pending=students.reduce((n,s)=>n+s.tasks.filter(t=>!t.done).length,0);return <div className="grid"><div className="grid g4"><Metric title="관리 학생" val={students.length}/><Metric title="평균 준비도" val={avg+"점"}/><Metric title="미완료 액션" val={pending}/><Metric title="이번 사이클" val="2026"/></div><div className="grid g2"><div className="card"><h3>최근 학생 진행상황</h3>{students.map(s=><div className="student-row" key={s.id}><b>{s.name}</b><span>{s.school}</span><span>{s.target}</span><div><div className="progress"><div style={{width:s.progress+"%"}}/></div><span className="small">{s.progress}%</span></div><button className="btn ghost" onClick={()=>{setSelected(s.id);setView("student")}}>상세</button></div>)}</div><div className="card"><h3>오늘 확인할 일</h3>{students.flatMap(s=>s.tasks.filter(t=>!t.done).map(t=>({student:s.name,text:t.text}))).slice(0,8).map((t,i)=><p className="small" key={i}><span className="pill p-amber">{t.student}</span> {t.text}</p>)}</div></div></div>}
function Metric({title,val}){return <div className="card metric"><span>{title}</span><strong>{val}</strong></div>}
function Students({students,selected,setSelected,setView,add}){return <div><div className="right" style={{justifyContent:"space-between",marginBottom:12}}><p className="muted small">담당 학생을 검색하고 상세 프로필로 들어갑니다.</p><button className="btn primary" onClick={add}>학생 추가</button></div>{students.map(s=><div className="student-row" key={s.id}><div><b>{s.name}</b><div className="small muted">{s.en} · {s.grade}</div></div><span>{s.school}</span><span>{s.target}</span><span className="pill p-blue">{s.status}</span><button className="btn ghost" onClick={()=>{setSelected(s.id);setView("student")}}>열기</button></div>)}</div>}
function StudentDetail({st,tab,setTab,update}){const tabs=[["overview","개요"],["academics","학교/학업"],["tests","시험"],["ecs","EC 활동"],["cms","CMS EC 로드맵"],["strategy","지원 전략"],["schedule","일정"],["roadmap","액션 플랜"],["report","보고서"]];return <div><div className="card" style={{marginBottom:14}}><div className="right" style={{justifyContent:"space-between"}}><div><h3 style={{marginBottom:4}}>{st.name} <span className="muted">{st.en}</span></h3><p className="small muted">{st.school} · {st.grade} · {st.target} · Deadline {st.deadline||"미정"}</p></div><span className="pill p-green">준비도 {score(st).total}점</span></div></div><div className="tabs">{tabs.map(t=><button className={"tab "+(tab===t[0]?"active":"")} onClick={()=>setTab(t[0])} key={t[0]}>{t[1]}</button>)}</div>{tab==="overview"&&<Overview st={st} update={update}/>} {tab==="academics"&&<Academics st={st} update={update}/>} {tab==="tests"&&<Tests st={st} update={update}/>} {tab==="ecs"&&<Ecs st={st} update={update}/>} {tab==="cms"&&<CmsRoadmap st={st} update={update}/>} {tab==="strategy"&&<Strategy st={st} update={update}/>} {tab==="schedule"&&<StudentSchedule st={st} update={update}/>} {tab==="roadmap"&&<Roadmap st={st} update={update}/>} {tab==="report"&&<Report st={st}/>}</div>}
function Overview({st,update}){return <div className="grid g2"><div className="card"><h3>기본 정보 / 학생 리스트 필드</h3>{["name","en","school","grade","target","deadline","owner","advisor","dorm","priority","status"].map(k=><div className="field" key={k}><span className="label">{k}</span><input className="input" value={st[k]||""} onChange={e=>update({[k]:e.target.value})}/></div>)}</div><div className="card"><h3>관리 메모 / Hook / 프로젝트</h3><Text label="학생 핵심 Hook / Story Angle" val={st.profile||""} set={v=>update({profile:v})}/><Text label="과외 / Tutoring" val={st.tutoring||""} set={v=>update({tutoring:v})}/><Text label="TOEFL/SSAT 계획" val={st.testPlan||""} set={v=>update({testPlan:v})}/><Text label="프로젝트 / 리서치 / 포트폴리오 계획" val={st.projectPlan||""} set={v=>update({projectPlan:v})}/><Text label="특이사항 / 학부모 요청" val={st.notes||""} set={v=>update({notes:v})}/><div className="field"><span className="label">진행률</span><input className="input" type="number" value={st.progress||0} onChange={e=>update({progress:Number(e.target.value)})}/></div></div></div>}
function Academics({st,update}){const add=()=>update({academics:[...st.academics,{term:"",school:"",gpa:"",comment:""}]});return <ArrayEditor title="성적표 / Teacher's Comment" rows={st.academics} add={add} render={(r,i)=><div className="grid g4"><Input label="학기" val={r.term} set={v=>editArr(st,update,"academics",i,{term:v})}/><Input label="학교" val={r.school} set={v=>editArr(st,update,"academics",i,{school:v})}/><Input label="성적/GPA" val={r.gpa} set={v=>editArr(st,update,"academics",i,{gpa:v})}/><Text label="Teacher's comment" val={r.comment} set={v=>editArr(st,update,"academics",i,{comment:v})}/></div>}/>}
function Tests({st,update}){const add=()=>update({tests:[...st.tests,{type:"SSAT",date:"",overall:"",detail:""}]});return <ArrayEditor title="Standardized / English Tests" rows={st.tests} add={add} render={(r,i)=><div className="grid g4"><Input label="시험" val={r.type} set={v=>editArr(st,update,"tests",i,{type:v})}/><Input label="날짜" val={r.date} set={v=>editArr(st,update,"tests",i,{date:v})}/><Input label="총점/Percentile" val={r.overall} set={v=>editArr(st,update,"tests",i,{overall:v})}/><Text label="섹션 상세" val={r.detail} set={v=>editArr(st,update,"tests",i,{detail:v})}/></div>}/>}
function Ecs({st,update}){const add=()=>update({ecs:[...st.ecs,{cat:"Sports",season:"Fall",name:"",team:"",from:"",to:"",hours:"",weeks:"",position:"",level:"",leadership:"",impact:"",evidence:"",schoolMatch:"",story:"",rating:"3"}]});const ratings=["Sports","Arts","Clubs","Service","Projects","Leadership"].map(k=>({k,v:st.ecs.filter(e=>(e.cat||"").toLowerCase().includes(k.toLowerCase().slice(0,5))).length?4:2}));return <div className="grid"><div className="card"><h3>EC Strength Overview</h3><div className="grid g4">{ratings.map(x=><div className="metric" key={x.k}><span>{x.k}</span><strong>{x.v}/5</strong></div>)}</div><p className="small muted" style={{marginTop:10}}>CMS EC 기준: 스포츠/아트/클럽/봉사/프로젝트/리더십을 각각 1-5로 보고, 활동명보다 역할·기간·주당 시간·임팩트·증빙·지원서 스토리를 관리합니다.</p></div><ArrayEditor title="EC 활동 — 스포츠/아트/클럽/봉사/프로젝트" rows={st.ecs} add={add} render={(r,i)=><div><div className="grid g4"><Input label="분류" val={r.cat} set={v=>editArr(st,update,"ecs",i,{cat:v})}/><Input label="시즌" val={r.season} set={v=>editArr(st,update,"ecs",i,{season:v})}/><Input label="활동/스포츠" val={r.name} set={v=>editArr(st,update,"ecs",i,{name:v})}/><Input label="팀/클럽명" val={r.team} set={v=>editArr(st,update,"ecs",i,{team:v})}/></div><div className="grid g4"><Input label="시작 mm.yyyy" val={r.from} set={v=>editArr(st,update,"ecs",i,{from:v})}/><Input label="종료 mm.yyyy" val={r.to} set={v=>editArr(st,update,"ecs",i,{to:v})}/><Input label="주당 시간" val={r.hours} set={v=>editArr(st,update,"ecs",i,{hours:v})}/><Input label="연간 주수" val={r.weeks} set={v=>editArr(st,update,"ecs",i,{weeks:v})}/></div><div className="grid g4"><Input label="포지션" val={r.position} set={v=>editArr(st,update,"ecs",i,{position:v})}/><Input label="레벨/JV/Varsity" val={r.level} set={v=>editArr(st,update,"ecs",i,{level:v})}/><Input label="EC Rating 1-5" val={r.rating} set={v=>editArr(st,update,"ecs",i,{rating:v})}/><Input label="학교 프로그램 매칭" val={r.schoolMatch} set={v=>editArr(st,update,"ecs",i,{schoolMatch:v})}/></div><div className="grid g2"><Text label="리더십 / 역할 변화" val={r.leadership} set={v=>editArr(st,update,"ecs",i,{leadership:v})}/><Text label="임팩트 / 수상 / 결과" val={r.impact} set={v=>editArr(st,update,"ecs",i,{impact:v})}/><Text label="증빙 자료" val={r.evidence} set={v=>editArr(st,update,"ecs",i,{evidence:v})}/><Text label="지원서 Story Angle" val={r.story} set={v=>editArr(st,update,"ecs",i,{story:v})}/></div></div>}/></div>}
function CmsRoadmap({st,update}){const setCell=(cat,period,value)=>update({roadmap:{...(st.roadmap||{}),[cat]:{...((st.roadmap||{})[cat]||{}),[period]:value}}});return <div className="card"><h3>CMS EC Grade Roadmap — Grade 6 → 9</h3><p className="small muted">각 학기·방학별 집중 포인트와 마일스톤을 입력합니다. CMS EC 시트의 Sports, Arts, Clubs & Leadership, Service, Projects, Test Prep, Application 구조를 반영했습니다.</p><div style={{overflow:"auto"}}><table className="table" style={{minWidth:1500}}><thead><tr><th>Category</th><th>Focus / Goal</th>{roadmapPeriods.map(p=><th key={p}>{p}</th>)}</tr></thead><tbody>{roadmapCategories.map(c=><tr key={c[0]}><td><b>{c[1]}</b></td><td>{c[2]}</td>{roadmapPeriods.map(p=><td key={p}><textarea className="textarea" style={{minHeight:54,fontSize:11}} value={((st.roadmap||{})[c[0]]||{})[p]||""} onChange={e=>setCell(c[0],p,e.target.value)} placeholder={p.includes("Summer")?"camp / visit / project":p.includes("Application")?"submit / interview":"milestone"}/></td>)}</tr>)}</tbody></table></div></div>}
function Strategy({st,update}){const add=()=>update({applications:[...(st.applications||[]),{school:"",tier:"Reach",deadline:"",fit:"",why:"",materials:"",interview:"",status:"Research"}]});return <div className="grid"><div className="card"><h3>지원 전략 요약</h3><div className="grid g3"><Text label="Reach / Match / Safety 전략" val={st.priority||""} set={v=>update({priority:v})}/><Text label="핵심 보완 Gap" val={st.notes||""} set={v=>update({notes:v})}/><Text label="최종 지원 Narrative" val={st.profile||""} set={v=>update({profile:v})}/></div></div><ArrayEditor title="학교별 Application Tracker" rows={st.applications||[]} add={add} render={(r,i)=><div><div className="grid g4"><Input label="학교" val={r.school} set={v=>editArr(st,update,"applications",i,{school:v})}/><Input label="Tier" val={r.tier} set={v=>editArr(st,update,"applications",i,{tier:v})}/><Input label="Deadline" val={r.deadline} set={v=>editArr(st,update,"applications",i,{deadline:v})}/><Input label="Status" val={r.status} set={v=>editArr(st,update,"applications",i,{status:v})}/></div><div className="grid g2"><Text label="Fit 근거 / 학교 프로그램" val={r.fit} set={v=>editArr(st,update,"applications",i,{fit:v})}/><Text label="Why School / Essay 소재" val={r.why} set={v=>editArr(st,update,"applications",i,{why:v})}/><Text label="필요 서류 / 포털 체크" val={r.materials} set={v=>editArr(st,update,"applications",i,{materials:v})}/><Text label="인터뷰 일정 / 질문 대비" val={r.interview} set={v=>editArr(st,update,"applications",i,{interview:v})}/></div></div>}/></div>}
function StudentSchedule({st,update}){return <div className="grid g2"><ArrayEditor title="주중 일정" rows={st.weekly} add={()=>update({weekly:[...st.weekly,["Mon","Activity","17:00"]]})} render={(r,i)=><div className="grid g3"><Input label="요일" val={r[0]} set={v=>editArrRaw(st,update,"weekly",i,[v,r[1],r[2]])}/><Input label="활동" val={r[1]} set={v=>editArrRaw(st,update,"weekly",i,[r[0],v,r[2]])}/><Input label="시간" val={r[2]} set={v=>editArrRaw(st,update,"weekly",i,[r[0],r[1],v])}/></div>}/><ArrayEditor title="방학 일정" rows={st.vacations} add={()=>update({vacations:[...st.vacations,{period:"",plan:""}]})} render={(r,i)=><div className="grid g2"><Input label="기간" val={r.period} set={v=>editArr(st,update,"vacations",i,{period:v})}/><Text label="계획" val={r.plan} set={v=>editArr(st,update,"vacations",i,{plan:v})}/></div>}/></div>}
function Roadmap({st,update}){const add=()=>update({tasks:[...st.tasks,{text:"",done:false}]});return <div className="card"><div className="right" style={{justifyContent:"space-between"}}><h3>액션 플랜</h3><button className="btn primary" onClick={add}>추가</button></div>{st.tasks.map((t,i)=><div className="right" key={i} style={{justifyContent:"space-between",borderBottom:"1px solid #e5e7eb",padding:"10px 0"}}><label><input type="checkbox" checked={t.done} onChange={e=>editArr(st,update,"tasks",i,{done:e.target.checked})}/> <input className="input" style={{width:420,maxWidth:"70vw"}} value={t.text} onChange={e=>editArr(st,update,"tasks",i,{text:e.target.value})}/></label><button className="btn ghost" onClick={()=>removeArr(st,update,"tasks",i)}>삭제</button></div>)}</div>}
function Reports({students,selected,setSelected}){const st=selected||students[0];return <div><div className="card" style={{marginBottom:14}}><span className="label">보고서 학생 선택</span><select className="select" value={st?.id} onChange={e=>setSelected(e.target.value)}>{students.map(s=><option value={s.id} key={s.id}>{s.name}</option>)}</select></div>{st&&<Report st={st}/>}</div>}
function Report({st}){const sc=score(st);return <div className="report"><div className="report-cover"><div className="brand">YES Boarding Prep</div><h2>{st.name} 학생 전략 리포트</h2><p>{st.school} · {st.target} · 담당자 입력 데이터 기반</p></div><div className="report-body"><div className="section-title"><span>01</span>현재 진단</div><div className="rubrics"><Rub title="Academics" val={sc.acad} max="20"/><Rub title="Culture" val={sc.culture} max="20"/><Rub title="Clubs & EC" val={sc.clubs} max="20"/><Rub title="Sports+Arts+Misc" val={sc.sam} max="35"/></div><div className="section-title"><span>02</span>핵심 전략</div><p>현재 총점은 <b>{sc.total}점</b>입니다. {st.profile||"학생 Hook을 입력하면 보고서 문장이 더 구체화됩니다."}</p><table className="table"><tbody><tr><th>시험</th><td>{st.tests.map(t=>`${t.type} ${t.overall} (${t.detail})`).join(" / ")||"시험 데이터 필요"}<br/><b>계획:</b> {st.testPlan||"미입력"}</td></tr><tr><th>학업</th><td>{st.academics.map(a=>`${a.term}: ${a.gpa} · ${a.comment}`).join(" / ")||"성적표와 Teacher comment 입력 필요"}</td></tr><tr><th>EC</th><td>{st.ecs.map(e=>`${e.season} ${e.name} · ${e.position||"role TBD"} · ${e.leadership||"leadership TBD"} · Story: ${e.story||e.impact||"정리 필요"}`).join(" / ")||"EC 입력 필요"}</td></tr><tr><th>프로젝트</th><td>{st.projectPlan||"프로젝트/리서치/포트폴리오 계획 필요"}</td></tr><tr><th>학교 전략</th><td>{(st.applications||[]).map(a=>`${a.school}(${a.tier}) ${a.status}: ${a.fit||a.why}`).join(" / ")||st.priority||"Reach/Match/Safety 리스트 필요"}</td></tr></tbody></table><div className="section-title"><span>03</span>다음 액션</div>{st.tasks.map((t,i)=><p className="small" key={i}><span className={"pill "+(t.done?"p-green":"p-amber")}>{t.done?"완료":"진행"}</span> {t.text}</p>)}</div></div>}
function Rub({title,val,max}){return <div className="rubric"><b>{title}</b><strong>{val}</strong><span className="muted"> / {max}</span><div className="progress" style={{marginTop:8}}><div style={{width:(val/Number(max)*100)+"%"}}/></div></div>}
function Schedule({students}){const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];const times=["09:00","12:00","15:00","17:00","19:00"];return <div className="card"><h3>전체 주중 일정</h3><div className="schedule"><div className="cell head">Time</div>{days.map(d=><div className="cell head" key={d}>{d}</div>)}{times.map(t=><React.Fragment key={t}><div className="cell time">{t}</div>{days.map(d=><div className="cell" key={d+t}>{students.flatMap(s=>s.weekly.filter(w=>w[0]===d&&w[2]===t).map(w=><div key={s.id+w[1]}><b>{s.name}</b><br/>{w[1]}</div>))}</div>)}</React.Fragment>)}</div></div>}
function Admin({data,setSelected,setView}){const byOwner=accounts.filter(a=>a.role==="staff").map(a=>({staff:a,students:data.students.filter(s=>s.owner===a.id)}));return <div className="grid"><div className="grid g3">{byOwner.map(x=><div className="card" key={x.staff.id}><h3>{x.staff.name}</h3><p className="small muted">담당 {x.students.length}명 · 미완료 {x.students.reduce((n,s)=>n+s.tasks.filter(t=>!t.done).length,0)}건</p><div className="progress"><div style={{width:Math.round(x.students.reduce((n,s)=>n+s.progress,0)/(x.students.length||1))+"%"}}/></div></div>)}</div><div className="card"><h3>전체 학생 상세</h3><table className="table"><thead><tr><th>학생</th><th>담당자</th><th>학교</th><th>목표</th><th>준비도</th><th></th></tr></thead><tbody>{data.students.map(s=><tr key={s.id}><td>{s.name}</td><td>{accounts.find(a=>a.id===s.owner)?.name}</td><td>{s.school}</td><td>{s.target}</td><td>{score(s).total}점</td><td><button className="btn ghost" onClick={()=>{setSelected(s.id);setView("student")}}>상세</button></td></tr>)}</tbody></table></div></div>}
function ArrayEditor({title,rows,add,render}){return <div className="card"><div className="right" style={{justifyContent:"space-between",marginBottom:10}}><h3>{title}</h3><button className="btn primary" onClick={add}>추가</button></div>{rows.length===0&&<p className="small muted">아직 입력된 데이터가 없습니다.</p>}{rows.map((r,i)=><div key={i} style={{border:"1px solid #e5e7eb",borderRadius:8,padding:12,marginBottom:10}}>{render(r,i)}</div>)}</div>}
function Input({label,val,set}){return <div className="field"><span className="label">{label}</span><input className="input" value={val||""} onChange={e=>set(e.target.value)}/></div>}
function Text({label,val,set}){return <div className="field"><span className="label">{label}</span><textarea className="textarea" value={val||""} onChange={e=>set(e.target.value)}/></div>}
function editArr(st,update,key,i,patch){update({[key]:st[key].map((x,idx)=>idx===i?{...x,...patch}:x)})}
function editArrRaw(st,update,key,i,next){update({[key]:st[key].map((x,idx)=>idx===i?next:x)})}
function removeArr(st,update,key,i){update({[key]:st[key].filter((_,idx)=>idx!==i)})}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
